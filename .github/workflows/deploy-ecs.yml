name: Deploy to ECS

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: phoenician-prod
  ECS_CLUSTER: phoenician-prod-cluster
  ECS_SERVICE: phoenician-prod-service

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY"
          docker build \
            --tag "$IMAGE_URI:$IMAGE_TAG" \
            --tag "$IMAGE_URI:latest" \
            --cache-from "$IMAGE_URI:latest" \
            .
          docker push "$IMAGE_URI:$IMAGE_TAG"
          docker push "$IMAGE_URI:latest"
          echo "image=$IMAGE_URI:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS (force new deployment)
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Wait for ECS service to stabilize
        run: |
          echo "Waiting for ECS service to reach steady state..."
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"
          echo "ECS service is stable."

      - name: Deployment summary
        run: |
          echo "### Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** ${{ steps.build-image.outputs.image }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Cluster:** $ECS_CLUSTER" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Service:** $ECS_SERVICE" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].{Status:status,Running:runningCount,Desired:desiredCount}' \
            --output table
