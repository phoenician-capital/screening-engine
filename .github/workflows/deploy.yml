name: Auto-Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Lambda Deployment
        run: |
          curl -X POST https://jcx8vpljvk.execute-api.eu-north-1.amazonaws.com/prod/deploy \
            -H "Content-Type: application/json" \
            -d '{"ref":"refs/heads/main"}'
          echo "✅ Deploy triggered via AWS Lambda"
