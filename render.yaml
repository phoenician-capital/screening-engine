services:
  # ── Streamlit Dashboard ──────────────────────────────────────────────────────
  - type: web
    name: screening-engine-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: bash scripts/start_dashboard.sh
    plan: starter
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      # ── Supabase Database ────────────────────────────────────────────────────
      - key: DB_HOST
        value: db.ftkgqkomxikkcwytevha.supabase.co
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL
        value: "require"
      # ── Redis ────────────────────────────────────────────────────────────────
      - key: REDIS_HOST
        fromService:
          name: screening-engine-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: screening-engine-redis
          type: redis
          property: port
      # ── API Keys (set manually in Render dashboard) ──────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: https://us.cloud.langfuse.com
      # ── Model Config ─────────────────────────────────────────────────────────
      - key: PRIMARY_LLM
        value: claude-sonnet-4-6
      - key: MEMO_LLM
        value: claude-opus-4-6
      - key: EXTRACTION_LLM
        value: gpt-4.1-mini
      - key: PERPLEXITY_MODEL
        value: sonar-deep-research
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: EMBEDDING_DIM
        value: "1536"
      # ── Data Sources ─────────────────────────────────────────────────────────
      - key: SEC_EDGAR_USER_AGENT
        value: PhoenicianCapital admin@phoenician.capital
      - key: SEC_RATE_LIMIT_RPS
        value: "10"
      # ── Scoring ──────────────────────────────────────────────────────────────
      - key: MIN_MARKET_CAP
        value: "250000000"
      - key: MAX_MARKET_CAP
        value: "5000000000"
      - key: HARD_MIN_MARKET_CAP
        value: "100000000"
      - key: HARD_MAX_MARKET_CAP
        value: "10000000000"
      - key: VECTOR_BACKEND
        value: pgvector
      - key: VECTOR_COLLECTION
        value: documents

  # ── MCP Server ───────────────────────────────────────────────────────────────
  - type: web
    name: screening-engine-mcp
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: bash scripts/start_mcp.sh
    plan: starter
    envVars:
      - key: DB_HOST
        value: db.ftkgqkomxikkcwytevha.supabase.co
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL
        value: "require"
      - key: REDIS_HOST
        fromService:
          name: screening-engine-redis
          type: redis
          property: host
      - key: ANTHROPIC_API_KEY
        sync: false

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: screening-engine-redis
    plan: starter
    maxmemoryPolicy: noeviction
